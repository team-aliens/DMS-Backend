name: CI with Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [main, notification, gateway]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify Docker is running
        run: docker info

      - name: Run tests for ${{ matrix.service }} service
        run: |
          if [ "${{ matrix.service }}" = "main" ]; then
            ./gradlew :dms-main:test jacocoMainServiceReport --info
          elif [ "${{ matrix.service }}" = "notification" ]; then
            ./gradlew :dms-notification:test jacocoNotificationServiceReport --info
          elif [ "${{ matrix.service }}" = "gateway" ]; then
            ./gradlew :dms-gateway:test jacocoGatewayServiceReport --info
          fi

      - name: Upload coverage for ${{ matrix.service }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/jacoco/${{ matrix.service }}-service/jacocoTestReport.xml
          flags: ${{ matrix.service }}-service
          name: ${{ matrix.service }}-service-coverage
          fail_ci_if_error: false
          verbose: true

  test-all:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify Docker is running
        run: docker info

      - name: Run all tests
        run: ./gradlew test --info

      - name: Generate service-specific coverage reports
        run: ./gradlew jacocoAllServiceReports --info

      - name: Delete previous coverage comments
        if: github.event_name == 'pull_request'
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | contains("## 📊 Test Coverage Summary")) | .id' | \
          while read comment_id; do
            gh api repos/${{ github.repository }}/issues/comments/$comment_id -X DELETE
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate coverage comment
        if: github.event_name == 'pull_request'
        run: |
          parse_coverage() {
            local xml_file=$1
            if [ ! -f "$xml_file" ]; then
              echo "N/A"
              return
            fi

            local missed=$(grep -o 'type="INSTRUCTION"[^>]*' "$xml_file" | grep -o 'missed="[0-9]*"' | head -1 | grep -o '[0-9]*')
            local covered=$(grep -o 'type="INSTRUCTION"[^>]*' "$xml_file" | grep -o 'covered="[0-9]*"' | head -1 | grep -o '[0-9]*')

            if [ -z "$missed" ] || [ -z "$covered" ]; then
              echo "N/A"
              return
            fi

            local total=$((missed + covered))
            if [ $total -eq 0 ]; then
              echo "0.00%"
            else
              local coverage=$(awk "BEGIN {printf \"%.2f\", ($covered / $total) * 100}")
              echo "${coverage}%"
            fi
          }

          MAIN_COVERAGE=$(parse_coverage "build/reports/jacoco/main-service/jacocoTestReport.xml")
          NOTIFICATION_COVERAGE=$(parse_coverage "build/reports/jacoco/notification-service/jacocoTestReport.xml")
          GATEWAY_COVERAGE=$(parse_coverage "build/reports/jacoco/gateway-service/jacocoTestReport.xml")

          COMMENT_BODY=$(cat << 'EOF'
          ## 📊 Test Coverage Summary

          | Service | Overall Coverage |
          |---------|------------------|
          | Main | MAIN_COV |
          | Notification | NOTIFICATION_COV |
          | Gateway | GATEWAY_COV |

          > Coverage reports generated by JaCoCo
          EOF
          )

          COMMENT_BODY="${COMMENT_BODY//MAIN_COV/$MAIN_COVERAGE}"
          COMMENT_BODY="${COMMENT_BODY//NOTIFICATION_COV/$NOTIFICATION_COVERAGE}"
          COMMENT_BODY="${COMMENT_BODY//GATEWAY_COV/$GATEWAY_COVERAGE}"

          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT_BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
