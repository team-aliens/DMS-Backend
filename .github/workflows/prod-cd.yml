name: CD for Prod

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # 수동 실행 = 전체 강제 배포

concurrency:
  group: prod-cd
  cancel-in-progress: false   # 배포 도중 취소 금지

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  # ── 0) 변경 감지 → 배포할 서비스 matrix 동적 생성 ───────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      any: ${{ steps.set.outputs.any }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # 기본값은 레포 기본 브랜치(develop) 기준 비교라 develop→main 머지 시 diff가 비어
          # 배포가 전부 스킵됨. main 자신을 base로 두면 "직전 푸시 커밋과 비교"로 동작
          base: main
          filters: |
            shared:
              - 'buildSrc/**'
              - 'gradle/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradlew.bat'
            contracts:
              - 'contracts/**'
            gateway:
              - 'dms-gateway/**'
            main:
              - 'dms-main/**'
            notification:
              - 'dms-notification/**'

      - id: set
        env:
          SHARED: ${{ steps.filter.outputs.shared }}
          CONTRACTS: ${{ steps.filter.outputs.contracts }}
          GW: ${{ steps.filter.outputs.gateway }}
          MN: ${{ steps.filter.outputs.main }}
          NT: ${{ steps.filter.outputs.notification }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # 수동 실행(workflow_dispatch)은 전체 강제 배포
          if [ "$EVENT" = "workflow_dispatch" ]; then SHARED=true; fi

          inc='[]'
          add() {
            inc=$(jq -c --arg s "$1" --arg e "$2" --arg t "$3" --arg p "$4" \
              '. + [{service:$s, ecr_repo:$e, target:$t, path:$p}]' <<<"$inc")
          }

          # gateway: 공유 or 본인 모듈
          if [ "$SHARED" = "true" ] || [ "$GW" = "true" ]; then
            add gateway dms-gateway dms-prod-gateway /opt/dms/gateway
          fi
          # main: 공유 or contracts or 본인 모듈
          if [ "$SHARED" = "true" ] || [ "$CONTRACTS" = "true" ] || [ "$MN" = "true" ]; then
            add main dms-main dms-prod-main /opt/dms/main
          fi
          # notification: 공유 or contracts or 본인 모듈
          if [ "$SHARED" = "true" ] || [ "$CONTRACTS" = "true" ] || [ "$NT" = "true" ]; then
            add notification dms-notification dms-prod-notification /opt/dms/notification
          fi

          echo "matrix={\"include\":$inc}" >> "$GITHUB_OUTPUT"
          if [ "$inc" = "[]" ]; then echo "any=false" >> "$GITHUB_OUTPUT"; else echo "any=true" >> "$GITHUB_OUTPUT"; fi
          echo "deploy targets: $inc"

  # ── 1) 테스트 게이트 (변경 있을 때만) ──────────────────────────────
  test:
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'
      - uses: gradle/gradle-build-action@v2
      - run: chmod +x gradlew
      - name: Run tests
        run: ./gradlew test --build-cache --no-daemon

  # ── 2) 이미지 빌드 & ECR 푸시 ─────────────────────
  build-push:
    needs: [changes, test]
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (access key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .                                  # 멀티모듈이라 컨텍스트는 레포 루트
          file: dms-${{ matrix.service }}/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ matrix.ecr_repo }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ matrix.ecr_repo }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── 3) 배포 (변경된 서비스만, SSM → compose pull+up) ───────────────
  deploy:
    needs: [changes, build-push]
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - name: Configure AWS credentials (access key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ${{ matrix.service }} via SSM
        env:
          TARGET: ${{ matrix.target }}
          DEPLOY_PATH: ${{ matrix.path }}
        run: |
          set -euo pipefail

          # 1) Name 태그로 실행 중인 인스턴스 ID 찾기
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${TARGET}" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::running instance not found for tag Name=${TARGET}"; exit 1
          fi
          echo "target instance: $INSTANCE_ID"

          # 2) 인스턴스에서 실행할 명령(JSON). \$ 는 인스턴스에서 평가됨
          cat > /tmp/params.json <<JSON
          { "commands": [
            "set -e",
            "cd ${DEPLOY_PATH}",
            "ACCOUNT=\$(aws sts get-caller-identity --query Account --output text)",
            "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin \$ACCOUNT.dkr.ecr.${AWS_REGION}.amazonaws.com",
            "docker compose pull",
            "docker compose up -d",
            "docker compose ps"
          ] }
          JSON

          # 3) SSM 전송
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy ${{ matrix.service }} @ ${GITHUB_SHA::7}" \
            --parameters file:///tmp/params.json \
            --query "Command.CommandId" --output text)
          echo "ssm command: $COMMAND_ID"

          # 4) 완료 대기 + 결과 확인
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query Status --output text)

          echo "----- stdout -----"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query StandardOutputContent --output text
          echo "----- status: $STATUS -----"

          if [ "$STATUS" != "Success" ]; then
            echo "----- stderr -----"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query StandardErrorContent --output text
            exit 1
          fi
